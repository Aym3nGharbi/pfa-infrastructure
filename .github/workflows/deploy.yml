name: Deploy OWASP Juice Shop

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-juiceshop:
    runs-on: self-hosted
    steps:
      - name: Pull latest Juice Shop image
        run: docker pull bkimminich/juice-shop:latest

      - name: Redeploy Juice Shop container
        run: |
          set -e
          if docker ps -a --format '{{.Names}}' | grep -q '^juice-shop$'; then
            docker rm -f juice-shop
          fi

          docker run -d \
            --name juice-shop \
            --restart unless-stopped \
            -p 3000:3000 \
            bkimminich/juice-shop:latest

      - name: Verify Juice Shop health via local endpoint
        run: |
          set -e
          sleep 10
          curl -fsS http://127.0.0.1:3000/ > /dev/null

      - name: Show running container
        run: docker ps --filter "name=juice-shop"
